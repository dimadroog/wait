# Игро-специфичные параметры среды (ML_CONCEPT §10)
# Путь: games/rushn_attack/env_config.yaml

actions:
  - ""
  - left
  - right
  - down
  - up
  - right+up
  - left+up
  - A
  - B

lives:
  min: 0
  max: 9

# H3: эпизод до game over (все жизни), не до первой смерти — меньше reset storm.
# A/B со старым поведением: --death-mode life_lost
death_mode: game_over
# Игнорировать dip lives на смене комнаты (streak ≤3); confirm должен быть больше.
death_confirm_steps: 4

# Secondary конец эпизода после попытки (level-room или ≥1 death):
# - lives<1 + title room (в т.ч. soft-reset/GO без counted death);
# - attract standing: title room + title_x + title_ys, confirm > mid-flash (~28);
# - truncate_grace/cool опционально (не главный путь).
episode_end_title:
  rooms: ["0x00"]
  confirm_steps: 8
  title_x: 129
  title_ys: [131, 133, 135]
  # Чуть выше max mid-episode flash (~28), чтобы резать idle attract, не flash.
  pose_confirm_steps: 32
  truncate_grace_steps: 40
  truncate_cool_steps: 16
  level_room_min: "0x08"
