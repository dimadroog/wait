# Игро-специфичные параметры среды (ML_CONCEPT §10)
# Путь: games/rushn_attack/env_config.yaml

actions:
  - ""
  - left
  - right
  - down
  - up
  - right+up
  - left+up
  - A
  - B

lives:
  min: 0
  max: 9

# H3: эпизод до game over (все жизни), не до первой смерти — меньше reset storm.
# A/B со старым поведением: --death-mode life_lost
death_mode: game_over
# Игнорировать dip lives на смене комнаты (streak ≤3); confirm должен быть больше.
death_confirm_steps: 4

# Secondary: стоп на title после ≥1 death (lives<1 + room), если budget death не сработал.
# Не поза x=129. Bridge отдаёт room как "0x00" — парсинг hex в BaseNesEnv.
episode_end_title:
  rooms: ["0x00"]
  confirm_steps: 8
