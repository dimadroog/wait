# Игро-специфичные параметры среды (ML_CONCEPT §10)
# Путь: games/rushn_attack/env_config.yaml

actions:
  - ""
  - left
  - right
  - down
  - up
  - right+up
  - left+up
  - A
  - B
  - start

lives:
  min: 0
  max: 9

# H3: штрафы за каждую потерю жизни; выход эпизода RnA — только game-over-freeze
# (не бюджет N смертей). A/B со старым life_lost: --death-mode life_lost
# (ядро BaseNesEnv; RnA всё равно не terminated на death —
# см. RushnAttackEnv._terminate_on_death).
death_mode: game_over
# Игнорировать dip lives на смене комнаты (streak ≤3); confirm должен быть больше.
death_confirm_steps: 4

# Конец попытки (train + inference): durable GAME OVER freeze.
# Поля title_* — якоря для отличия GO от title standing (y∉title_ys).
episode_end_title:
  rooms: ["0x00"]
  title_x: 129
  title_ys: [131, 133, 135]
  # Стоп на экране GAME OVER до title/attract (TASK_STOP_TITLE_ATTRACT).
  game_over_freeze_confirm_steps: 32
  # Гейт «попытка началась» для freeze (не стопить чистый power-on intro).
  min_attempt_steps: 120
  level_room_min: "0x08"
  # Truncate grace у max_episode_steps.
  truncate_grace_steps: 40
  truncate_cool_steps: 16
